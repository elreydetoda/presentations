---
apiVersion: v1
kind: Service
metadata:
  name: pve2-external
  namespace: ingress-services
spec:
  ports:
    - name: https
      port: 8443      # Traefik service port
      targetPort: 8006 # Proxmox management console port
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: pve2-external-1
  namespace: ingress-services
  labels:
    kubernetes.io/service-name: pve2-external
addressType: IPv4
endpoints:
  - addresses:
      - <PROXMOX_IP>
    conditions:
      ready: true
ports:
  - name: https
    port: 8006
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pve2
  namespace: ingress-services
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`<sub_domain>.<wildcard_sub_domain>.elrey.casa`)
      kind: Rule
      services:
        - name: pve2-external
          port: 8443
  tls:
    secretName: local-elrey-casa-tls